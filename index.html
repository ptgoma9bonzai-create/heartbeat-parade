<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080b20">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>HEARTBEAT PARADE</title>
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body>
  <main class="game-shell">
    <header class="top-hud">
      <div class="headline">
        <div><span>SCORE</span><strong id="score">000000</strong></div>
        <h1>HEARTBEAT PARADE</h1>
        <div><span>COMBO</span><strong id="combo">× 001</strong></div>
      </div>
      <section class="loadout-hud" aria-label="武器と残機の状態">
        <div class="weapon-ranks">
          <span class="shot-rank">S <b id="shot-rank">1</b></span>
          <span class="laser-rank">L <b id="laser-rank">0</b></span>
          <span class="missile-rank">M <b id="missile-rank">0</b></span>
        </div>
        <div class="stock-status">
          <span>LIFE <b id="life-stock">♥♥♥♥♥</b></span>
          <span>BOMB <b id="bomb-stock">●●●○○</b></span>
        </div>
      </section>
    </header>

    <div class="canvas-wrap">
      <canvas id="game" width="480" height="720" aria-label="縦スクロールシューティングゲーム"></canvas>
      <section id="overlay" class="overlay">
        <p class="eyebrow">A TINY STORY OF STARS</p>
        <h2 id="overlay-title">HEARTBEAT<br>PARADE</h2>
        <p id="overlay-message">別れを集めて、夜明けを取り戻そう。</p>
        <div id="game-select" class="game-select">
          <div class="select-group"><b>MODE</b><button class="select" data-difficulty="easy">EASY</button><button class="select active" data-difficulty="normal">NORMAL</button><button class="select" data-difficulty="hard">HARD</button><button id="hell-mode" class="select hell" data-difficulty="hell" hidden>HELL</button></div>
          <div class="select-group ships"><b>CHARACTER</b><button class="select active" data-ship="clione">ルミ<br><small>万能クリオネ</small></button><button class="select" data-ship="ribbon">メルティ<br><small>高速リボン</small></button><button class="select" data-ship="hammer">ガンガ<br><small>重撃宇宙人</small></button></div>
          <button id="stage6-retry" class="stage6-retry" type="button" hidden>HELL CHECKPOINT　STAGE 6から再戦</button>
        </div>
        <div class="continue-actions">
          <button id="start-button" type="button">はじめる</button>
          <button id="end-button" type="button" hidden>撤退: End Game</button>
        </div>
        <p class="controls">ドラッグ移動・ダブルタップでBOMB<br>2本指でPAUSE／PCはBキーでBOMB</p>
      </section>
      <button id="bomb-button" class="bomb-button" type="button" aria-label="ボムを使う">BOMB</button>
    </div>

    <footer>
      <span id="stage-label">STAGE 1</span>
      <span id="special-status" class="special-status">FNL 1/999</span>
      <span id="status-label">C 0/2</span>
    </footer>
  </main>
  <script src="game.js?v=25"></script>
  <script>
    if ("serviceWorker" in navigator) {
      addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register("./sw.js");
          registration.update();
        } catch (_) {}
      });
    }
  </script>
</body>
</html>
